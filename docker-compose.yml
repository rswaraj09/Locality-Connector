# Locality Connector - local container orchestration.
# Copy .env.example to .env and fill in secrets before running `docker compose up --build`.
services:
  app:
    build: .
    image: locality-connector:latest
    container_name: locality-connector
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-/app/config/serviceAccountKey.json}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_MAPS_GEOCODING_API_KEY: ${GOOGLE_MAPS_GEOCODING_API_KEY:-}
      MAPPLS_API_KEY: ${MAPPLS_API_KEY:-}
    volumes:
      # Mount the Firebase service account JSON read-only into the container.
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
