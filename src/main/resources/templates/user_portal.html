<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>User Portal</title>
    <style>
        .portal-wrapper { display: flex; justify-content: center; align-items: center; padding: 60px 20px; flex: 1; }
        .portal-container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); padding: 60px 50px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); text-align: center; max-width: 550px; width: 100%; }
        .portal-container h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; background: linear-gradient(135deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .portal-container p { color: #94a3b8; margin-bottom: 40px; font-size: 1.1rem; line-height: 1.6; }
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 16px 40px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-block; flex: 1; min-width: 160px; }
        .btn-primary { background: #3b82f6; color: white; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #f8fafc; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
    </style>
</head>
<body>
<div layout:fragment="content" class="portal-wrapper">
    <div class="portal-container">
        <h1>User Portal</h1>
        <p>Discover local businesses, find nearby hospitals and shops, and connect with your local community effortlessly.</p>
        <div class="btn-group">
            <a th:href="@{/api/auth/user/login-page}" href="/api/auth/user/login-page" class="btn btn-primary">Login</a>
            <a th:href="@{/api/auth/user/signup-page}" href="/api/auth/user/signup-page" class="btn btn-secondary">Sign Up</a>
        </div>
    </div>
</div>
</body>
</html>
