<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-base: #060b14;
            --bg-card: rgba(255,255,255,0.04);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --indigo: #6366f1;
            --accent: #10b981;
            --text-main: #f0f6ff;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.10);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
            cursor: none;
            position: relative;
        }

        /* ── custom cursor ── */
        #cursor{position:fixed;width:12px;height:12px;background:var(--primary);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:screen;}
        #cursor-trail{position:fixed;width:34px;height:34px;border:1px solid rgba(99,102,241,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .12s ease,top .12s ease,width .3s,height .3s;}

        /* ── particle bg ── */
        #bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}

        /* ── ambient orbs ── */
        .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:orbFloat 9s ease-in-out infinite;}
        .orb1{width:520px;height:520px;background:radial-gradient(circle,rgba(59,130,246,.14),transparent 70%);top:-10%;left:-10%;}
        .orb2{width:460px;height:460px;background:radial-gradient(circle,rgba(16,185,129,.12),transparent 70%);bottom:-10%;right:-8%;animation-delay:-4s;}
        @keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-26px) scale(1.05);}}

        /* ── nav ── */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(6,11,20,.75);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
            animation: fadeDown .7s ease both;
        }
        @keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}

        nav h2 {
            font-weight: 800; font-size: 1.5rem;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links a {
            color: var(--text-muted); text-decoration: none;
            margin-left: 30px; font-weight: 500; font-size: .92rem;
            position: relative; cursor: none;
            transition: color .3s;
        }
        .nav-links a::after {
            content:''; position:absolute; bottom:-4px; left:0;
            width:0; height:1px; background: var(--primary);
            transition: width .3s;
        }
        .nav-links a:hover { color: var(--text-main); }
        .nav-links a:hover::after { width: 100%; }

        /* ── container ── */
        .container {
            position: relative; z-index: 10;
            flex: 1; max-width: 800px; width: 100%;
            margin: 60px auto; padding: 0 20px;
        }

        /* ── glass cards ── */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,.35);
            position: relative; overflow: hidden;
            opacity: 0; transform: translateY(24px);
            animation: riseIn .7s ease both;
            transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s, border-color .35s;
        }
        .card:nth-of-type(2) { animation-delay: .12s; }
        @keyframes riseIn{to{opacity:1;transform:translateY(0);}}
        .card::before{
            content:''; position:absolute; inset:0; opacity:0; transition:opacity .4s;
            background:radial-gradient(circle at 25% 20%, rgba(59,130,246,.08), transparent 60%);
            pointer-events:none;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 70px rgba(59,130,246,.15);
            border-color: rgba(59,130,246,.3);
        }
        .card:hover::before{opacity:1;}

        .card h2 {
            color: var(--text-main); margin-bottom: 30px;
            font-size: 1.4rem; font-weight: 700;
            display: flex; align-items: center; gap: 12px;
        }
        .card h2::before {
            content: ''; display: inline-block;
            width: 5px; height: 24px;
            background: linear-gradient(180deg, var(--primary), var(--indigo));
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(59,130,246,.5);
        }

        .form-group { margin-bottom: 25px; position: relative; }

        label {
            display: block; margin-bottom: 10px;
            font-weight: 600; color: var(--text-muted);
            font-size: .78rem; text-transform: uppercase; letter-spacing: 1px;
        }

        input {
            width: 100%; padding: 15px 20px;
            background: rgba(255,255,255,.03);
            border: 1.5px solid var(--border-color);
            color: var(--text-main);
            border-radius: 12px; font-size: 1rem;
            transition: border-color .3s, box-shadow .3s, background .3s;
        }
        input::placeholder{color:#5b6a80;}
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59,130,246,.14), 0 0 20px rgba(59,130,246,.08);
            background: rgba(59,130,246,.04);
        }

        /* ── buttons ── */
        .btn {
            position: relative; overflow: hidden;
            padding: 15px 32px;
            background: linear-gradient(135deg, var(--primary), var(--indigo));
            color: white; border: none; border-radius: 14px;
            cursor: none; font-weight: 700; font-size: .95rem;
            transition: transform .3s, box-shadow .3s;
            box-shadow: 0 0 26px rgba(59,130,246,.3);
        }
        .btn::before{
            content:''; position:absolute; inset:0;
            background:rgba(255,255,255,.15); transform:scaleX(0);
            transform-origin:left; transition:transform .35s; border-radius:14px;
        }
        .btn:hover::before{transform:scaleX(1);}
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(59,130,246,.4);
        }
        .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rippleAnim .6s ease;pointer-events:none;}
        @keyframes rippleAnim{to{transform:scale(4);opacity:0;}}

        .btn-success {
            background: linear-gradient(135deg, var(--accent), #059669);
            box-shadow: 0 0 26px rgba(16,185,129,.3);
        }
        .btn-success:hover { box-shadow: 0 18px 40px rgba(16,185,129,.4); }

        /* ── toast ── */
        .toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
        }
        .toast {
            background: rgba(15,23,42,.9);
            backdrop-filter: blur(14px);
            border-left: 4px solid var(--primary);
            color: white; padding: 16px 24px;
            border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,.4);
            display: flex; align-items: center; gap: 12px;
            transform: translateX(120%);
            transition: transform .45s cubic-bezier(.34,1.56,.64,1);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-color: var(--accent); }
        .toast.error { border-color: #ef4444; }

        @media (max-width: 768px) {
            .container { margin: 30px auto; }
            .card { padding: 30px 20px; }
            nav { padding: 18px 20px; flex-direction: column; gap: 15px; }
            .nav-links a { margin: 0 10px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *,*::before,*::after { animation-duration:.01ms!important; transition-duration:.01ms!important; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-trail"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <nav>
        <h2>Locality Connector</h2>
        <div class="nav-links">
            <a href="#" onclick="history.back()">Back</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="toast-container" id="toast-container"></div>

    <div class="container">
        <div class="card">
            <h2>Personal Information</h2>
            <form id="profile-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="Enter your current address">
                </div>
                <button type="submit" class="btn">Save Changes</button>
            </form>
        </div>

        <div class="card">
            <h2>Security</h2>
            <form id="password-form">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="current-password" required placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" required minlength="6" placeholder="Enter new password (min 6 characters)">
                </div>
                <button type="submit" class="btn btn-success">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        /* ══════════════════════════════════════════════════════
           ORIGINAL APPLICATION LOGIC — UNCHANGED
        ══════════════════════════════════════════════════════ */
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/user/login';

        function showToast(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : 'success'}`;
            toast.textContent = message;

            container.appendChild(toast);

            // Trigger reflow to enable transition
            setTimeout(() => toast.classList.add('show'), 10);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        async function loadProfile() {
            try {
                const res = await fetch('/api/user/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    const profile = data.data;
                    document.getElementById('name').value = profile.name || profile.ownerName || '';
                    document.getElementById('phone').value = profile.phoneNumber || '';
                    document.getElementById('address').value = profile.address || '';
                } else {
                    showToast('Failed to load profile data', true);
                }
            } catch (err) {
                showToast('Network error loading profile', true);
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                phoneNumber: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            try {
                const res = await fetch('/api/user/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Profile updated successfully');
                } else {
                    showToast(data.error || 'Update failed', true);
                }
            } catch (err) {
                showToast('Network error while updating', true);
            }
        });

        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                currentPassword: document.getElementById('current-password').value,
                newPassword: document.getElementById('new-password').value
            };

            try {
                const res = await fetch('/api/user/profile/password', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Password updated securely');
                    document.getElementById('password-form').reset();
                } else {
                    showToast(data.error || 'Password update failed', true);
                }
            } catch (err) {
                showToast('Network error while updating password', true);
            }
        });

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/user/login';
        }

        loadProfile();

        /* ══════════════════════════════════════════════════════
           NEW — PURELY VISUAL ENHANCEMENTS
        ══════════════════════════════════════════════════════ */
        (function () {
            'use strict';

            // Particle canvas
            var canvas = document.getElementById('bg-canvas');
            var ctx = canvas.getContext('2d');
            var W, H;
            var mouse = { x: -999, y: -999 };
            var COUNT = window.innerWidth < 768 ? 50 : 90;

            function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            function Particle(){ this.reset(); }
            Particle.prototype.reset = function(){
                this.x = Math.random()*W; this.y = Math.random()*H;
                this.r = Math.random()*1.1+.3;
                this.vx = (Math.random()-.5)*.25; this.vy = (Math.random()-.5)*.25;
                this.a = Math.random()*.4+.08;
                this.c = Math.random()>.5 ? '59,130,246' : '16,185,129';
            };
            Particle.prototype.step = function(){
                this.x += this.vx; this.y += this.vy;
                if (this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
            };
            Particle.prototype.draw = function(){
                ctx.beginPath();
                ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
                ctx.fillStyle = 'rgba(' + this.c + ',' + this.a + ')';
                ctx.fill();
            };

            var parts = [];
            for (var i=0;i<COUNT;i++) parts.push(new Particle());

            function loop(){
                ctx.clearRect(0,0,W,H);
                for (var i=0;i<parts.length;i++){ parts[i].step(); parts[i].draw(); }
                for (var i=0;i<parts.length;i++){
                    var p = parts[i];
                    var mdx = p.x-mouse.x, mdy = p.y-mouse.y, md = Math.sqrt(mdx*mdx+mdy*mdy);
                    if (md<130){
                        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(mouse.x,mouse.y);
                        ctx.strokeStyle = 'rgba(59,130,246,' + (0.12*(1-md/130)) + ')';
                        ctx.lineWidth = .5; ctx.stroke();
                    }
                }
                requestAnimationFrame(loop);
            }
            loop();

            // Custom cursor
            var cur = document.getElementById('cursor');
            var trail = document.getElementById('cursor-trail');
            var tx=0, ty=0, trX=0, trY=0;
            document.addEventListener('mousemove', function(e){
                tx = e.clientX; ty = e.clientY; mouse.x = tx; mouse.y = ty;
                cur.style.left = tx+'px'; cur.style.top = ty+'px';
            });
            function animTrail(){
                trX += (tx-trX)*.12; trY += (ty-trY)*.12;
                trail.style.left = trX+'px'; trail.style.top = trY+'px';
                requestAnimationFrame(animTrail);
            }
            animTrail();

            function bindHoverGrow(el){
                el.addEventListener('mouseenter', function(){
                    cur.style.width='20px'; cur.style.height='20px'; cur.style.background='rgba(59,130,246,0.6)';
                    trail.style.width='58px'; trail.style.height='58px';
                });
                el.addEventListener('mouseleave', function(){
                    cur.style.width='12px'; cur.style.height='12px'; cur.style.background='var(--primary)';
                    trail.style.width='34px'; trail.style.height='34px';
                });
            }
            var hoverEls = document.querySelectorAll('a,.btn,.card,input');
            for (var i=0;i<hoverEls.length;i++) bindHoverGrow(hoverEls[i]);

            // Ripple on buttons (delegated)
            document.addEventListener('click', function(e){
                var btn = e.target.closest ? e.target.closest('.btn') : null;
                if (!btn) return;
                var span = document.createElement('span');
                var rect = btn.getBoundingClientRect();
                var size = Math.max(rect.width, rect.height);
                span.className = 'ripple';
                span.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px';
                btn.appendChild(span);
                setTimeout(function(){ span.remove(); }, 600);
            });

            // Card 3D tilt
            var cards = document.querySelectorAll('.card');
            for (var i=0;i<cards.length;i++){
                (function(card){
                    card.addEventListener('mousemove', function(e){
                        var r = this.getBoundingClientRect();
                        var cx = (e.clientX-r.left)/r.width-.5, cy = (e.clientY-r.top)/r.height-.5;
                        this.style.transform = 'perspective(1000px) rotateY('+(cx*3)+'deg) rotateX('+(-cy*3)+'deg) translateY(-4px)';
                    });
                    card.addEventListener('mouseleave', function(){ this.style.transform = ''; });
                })(cards[i]);
            }

            // Reduced motion
            var prefersReduced = false;
            if (typeof window.matchMedia === 'function') {
                var mql = window.matchMedia('(prefers-reduced-motion:reduce)');
                prefersReduced = !!(mql && mql.matches);
            }
            if (prefersReduced) {
                var allEls = document.querySelectorAll('*');
                for (var i=0;i<allEls.length;i++){
                    allEls[i].style.animationDuration = '.01ms';
                    allEls[i].style.transitionDuration = '.01ms';
                }
            }
        })();
    </script>
</body>
</html>
