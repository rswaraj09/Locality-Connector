<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Locality Connector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', 'Arial', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        @keyframes slideIn {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 100%);
            border: 4px solid #ff6b35;
            border-radius: 20px;
            padding: 40px;
            margin: 20px;
            animation: slideIn 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
        }
        p.subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid #888;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        input[type="email"]:focus {
            border-bottom-color: #ff6b35;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.2);
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ff6b35 0%, #f94c57 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);
        }
        .link {
            color: #ff6b35;
            text-decoration: none;
            display: block;
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: center;
            transition: all 0.3s;
        }
        .link:hover {
            color: #f94c57;
            text-decoration: underline;
        }
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .message.success {
            background: #4CAF50;
            color: white;
        }
        .message.error {
            background: #d32f2f;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Forgot Password</h1>
        <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
        
        <div id="message" class="message"></div>
        
        <form id="forgot-password-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <button type="submit" class="btn" id="submit-btn">Send Reset Link</button>
        </form>
        <a href="/user/login" class="link">Back to Login</a>
    </div>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();
                
                if (response.ok) {
                    messageDiv.textContent = result.data.message || 'Check your email for the reset link.';
                    messageDiv.className = 'message success';
                } else {
                    messageDiv.textContent = result.error || 'Failed to send reset link.';
                    messageDiv.className = 'message error';
                }
            } catch (err) {
                messageDiv.textContent = 'Network error occurred.';
                messageDiv.className = 'message error';
            } finally {
                messageDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
