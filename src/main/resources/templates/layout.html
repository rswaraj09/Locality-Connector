<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Locality Connector</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; background-color: #0f172a; font-family: 'Inter', sans-serif; }
        .layout-body { display: flex; flex: 1; width: 100%; position: relative; }
        .layout-content { flex: 1; display: flex; flex-direction: column; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="layout-body">
        <div th:if="${showSidebar == true}" th:replace="~{fragments/sidebar :: sidebar}"></div>
        <main class="layout-content" layout:fragment="content"></main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
