<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Header Fragment</title></head>
<body>
<header th:fragment="header" class="lc-navbar" style="background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); width: 100%; box-sizing: border-box; z-index: 1000; position: relative;">
    <a class="brand" th:href="@{/}" style="color: #f8fafc; font-weight: 800; font-size: 1.4rem; text-decoration: none; letter-spacing: -0.5px;">Locality Connector</a>
    <nav style="display: flex; gap: 20px; align-items: center;">
        <a th:href="@{/}" style="color: #94a3b8; text-decoration: none; font-weight: 500; transition: color 0.2s;">Home</a>
        <a th:href="@{/user}" style="color: #94a3b8; text-decoration: none; font-weight: 500; transition: color 0.2s;">For Users</a>
        <a th:href="@{/business}" style="color: #94a3b8; text-decoration: none; font-weight: 500; transition: color 0.2s;">For Business</a>
        <a href="#" id="lc-logout-link" class="hidden" style="color: #ef4444; text-decoration: none; font-weight: 600; display: none;">Logout</a>
    </nav>
</header>
</body>
</html>
