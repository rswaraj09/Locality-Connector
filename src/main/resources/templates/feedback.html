<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Feedback</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root{
      --pink:#ec4899; --rose:#f5576c; --violet:#a855f7; --amber:#fbbf24;
      --dark0:#0f0a14; --glass:rgba(255,255,255,0.05); --glass-border:rgba(255,255,255,0.10);
      --text1:#fdf2f8; --text2:#c9b8d4; --text3:#8a7a96;
    }

    html{scroll-behavior:smooth;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--dark0); color:var(--text1);
      min-height:100vh; overflow-x:hidden; cursor:none; position:relative;
    }

    /* ── custom cursor ── */
    #cursor{position:fixed;width:12px;height:12px;background:var(--rose);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:screen;}
    #cursor-trail{position:fixed;width:34px;height:34px;border:1px solid rgba(236,72,153,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .12s ease,top .12s ease,width .3s,height .3s;}

    /* ── particle bg ── */
    #bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}

    /* ── ambient orbs ── */
    .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:orbFloat 9s ease-in-out infinite;}
    .orb1{width:520px;height:520px;background:radial-gradient(circle,rgba(236,72,153,.16),transparent 70%);top:-180px;left:-150px;}
    .orb2{width:420px;height:420px;background:radial-gradient(circle,rgba(168,85,247,.14),transparent 70%);bottom:-140px;right:-100px;animation-delay:-4s;}
    .orb3{width:280px;height:280px;background:radial-gradient(circle,rgba(251,191,36,.08),transparent 70%);top:45%;left:60%;animation-delay:-2s;}
    @keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-26px) scale(1.05);}}

    /* ── header ── */
    .header{
      position:sticky; top:0; z-index:100;
      background:rgba(15,10,20,.75); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--glass-border);
      padding:18px 40px;
      display:flex; justify-content:space-between; align-items:center;
      animation:fadeDown .7s ease both;
    }
    @keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
    .header h1{
      font-size:1.5rem; font-weight:800; letter-spacing:.5px;
      background:linear-gradient(135deg,#f472b6,#fb923c);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    .profile-dropdown{position:relative;display:inline-block;}
    .profile-icon{
      width:42px;height:42px;border-radius:50%;
      background:linear-gradient(135deg,var(--rose),var(--violet));
      display:flex;align-items:center;justify-content:center;
      color:#fff;cursor:none;font-size:18px;
      box-shadow:0 0 20px rgba(236,72,153,.4);
      transition:transform .3s,box-shadow .3s;
    }
    .profile-icon:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 0 30px rgba(236,72,153,.6);}
    .dropdown-content{
      display:none; position:absolute; right:0; margin-top:10px;
      background:rgba(23,15,31,.95); backdrop-filter:blur(20px);
      border:1px solid var(--glass-border);
      min-width:210px; border-radius:14px; overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      animation:dropIn .25s ease both;
    }
    @keyframes dropIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
    .dropdown-content a{
      color:var(--text2); padding:13px 18px; text-decoration:none; display:block;
      font-size:.88rem; transition:background .25s,color .25s,padding-left .25s;
      border-bottom:1px solid rgba(255,255,255,.04);
    }
    .dropdown-content a:hover{background:rgba(236,72,153,.08);color:var(--text1);padding-left:24px;}
    .dropdown-content a:last-child{color:#fb7185;border-bottom:none;}

    /* ── container ── */
    .container{
      max-width:820px; margin:48px auto; padding:36px;
      background:var(--glass); border:1px solid var(--glass-border);
      border-radius:24px; backdrop-filter:blur(20px);
      box-shadow:0 30px 90px rgba(0,0,0,.4);
      position:relative; z-index:10;
      opacity:0; transform:translateY(24px);
      animation:riseIn .7s .1s ease both;
    }
    @keyframes riseIn{to{opacity:1;transform:translateY(0);}}

    h2.page-title{
      text-align:center; font-size:2.2rem; font-weight:800; margin-bottom:32px;
      background:linear-gradient(135deg,#f472b6,#a855f7,#fb923c);
      background-size:200%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:gradientShift 5s ease infinite;
    }
    @keyframes gradientShift{0%,100%{background-position:0%;}50%{background-position:100%;}}

    /* ── feedback cards ── */
    .feedback{
      margin-bottom:16px; padding:22px 24px; border-radius:16px;
      background:rgba(255,255,255,.03); border:1px solid var(--glass-border);
      border-left:3px solid var(--rose);
      position:relative; overflow:hidden;
      opacity:0; transform:translateY(16px) scale(.98);
      animation:cardIn .5s ease forwards;
      transition:transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s, border-color .35s;
    }
    @keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1);}}
    .feedback::before{
      content:''; position:absolute; inset:0; opacity:0; transition:opacity .4s;
      background:radial-gradient(circle at 20% 20%, rgba(236,72,153,.08), transparent 60%);
      pointer-events:none;
    }
    .feedback:hover{
      transform:translateY(-4px);
      box-shadow:0 20px 50px rgba(236,72,153,.15);
      border-left-color:var(--violet);
    }
    .feedback:hover::before{opacity:1;}
    .feedback h4{
      margin:0; font-size:1.08rem; font-weight:700;
      background:linear-gradient(135deg,#f472b6,#fb923c);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      display:inline-block;
    }
    .feedback p{margin-top:10px;color:var(--text2);font-size:.9rem;line-height:1.65;}

    /* ── empty / loading states ── */
    .state-msg{
      text-align:center; padding:40px 20px; color:var(--text3);
      font-size:.9rem; letter-spacing:.3px;
    }
    .shimmer{
      height:70px;border-radius:16px;margin-bottom:14px;
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 37%,rgba(255,255,255,.04) 63%);
      background-size:400% 100%;
      animation:shimmer 1.4s ease infinite;
    }
    @keyframes shimmer{0%{background-position:100% 50%;}100%{background-position:0 50%;}}

    @media(max-width:768px){
      .header{padding:14px 20px;}
      .container{margin:20px 16px;padding:22px;}
      h2.page-title{font-size:1.6rem;}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
    }
  </style>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="bg-canvas"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="header">
    <h1>Customer Feedback</h1>
    <div class="profile-dropdown">
        <div class="profile-icon" onclick="toggleDropdown()">👤</div>
        <div class="dropdown-content" id="dropdown">
            <a href="/listing">Manage Listings</a>
            <a href="/addlisting">Add Listing</a>
            <a href="/update-business">Update Profile</a>
            <a href="/business/login">Logout</a>
        </div>
    </div>
</div>

<div class="container">
  <h2 class="page-title">What Customers Are Saying</h2>
  <div id="feedback-list">
    <!-- Feedback items will be loaded here -->
  </div>
</div>

<script>
  /* ══════════════════════════════════════════════════════
     ORIGINAL APPLICATION LOGIC — UNCHANGED
  ══════════════════════════════════════════════════════ */
  function loadFeedback() {
      const feedbackList = document.getElementById('feedback-list');
      feedbackList.innerHTML = '<div class="shimmer"></div><div class="shimmer" style="width:85%"></div><div class="shimmer" style="width:70%"></div>';

      // Fetch feedback from the server (you can replace this with actual API call)
      fetch('Thirteenth.html')
      .then(response => response.json())
      .then(feedbackData => {
          feedbackList.innerHTML = '';

          if (!Array.isArray(feedbackData) || feedbackData.length === 0) {
              feedbackList.innerHTML = '<div class="state-msg">No feedback yet.</div>';
              return;
          }

          feedbackData.forEach((feedback, idx) => {
              const feedbackItem = document.createElement('div');
              feedbackItem.classList.add('feedback');
              feedbackItem.style.animationDelay = (idx * 0.07) + 's';
              feedbackItem.innerHTML = `
                  <h4>${feedback.name}</h4>
                  <p>${feedback.feedback}</p>
              `;
              feedbackList.appendChild(feedbackItem);
          });
      })
      .catch(error => {
          feedbackList.innerHTML = '<div class="state-msg">Error loading feedback.</div>';
          alert('Error loading feedback.');
      });
  }

  // Load feedback on page load
  window.onload = loadFeedback;

  // Profile dropdown functionality
  function toggleDropdown() {
      const dropdown = document.getElementById('dropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
  }

  // Close dropdown when clicking outside
  window.onclick = function(event) {
      var t = event && event.target;
      if (!t || typeof t.matches !== 'function' || !t.matches('.profile-icon')) {
          const dropdown = document.getElementById('dropdown');
          if (dropdown.style.display === 'block') {
              dropdown.style.display = 'none';
          }
      }
  }

  /* ══════════════════════════════════════════════════════
     NEW — PURELY VISUAL ENHANCEMENTS
  ══════════════════════════════════════════════════════ */
  (function () {
    'use strict';

    // Particle canvas
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const mouse = { x:-999, y:-999 };
    const COUNT = window.innerWidth < 768 ? 50 : 90;

    function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    class P {
        constructor(){ this.reset(); }
        reset(){
            this.x=Math.random()*W; this.y=Math.random()*H;
            this.r=Math.random()*1.1+.3;
            this.vx=(Math.random()-.5)*.25; this.vy=(Math.random()-.5)*.25;
            this.a=Math.random()*.4+.08;
            this.c = Math.random()>.5 ? '236,72,153' : '168,85,247';
        }
        step(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>W||this.y<0||this.y>H) this.reset(); }
        draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(${this.c},${this.a})`; ctx.fill(); }
    }
    const parts = Array.from({length:COUNT}, () => new P());

    function loop(){
        ctx.clearRect(0,0,W,H);
        parts.forEach(p=>{p.step();p.draw();});
        for(let i=0;i<parts.length;i++){
            const p = parts[i];
            const mdx=p.x-mouse.x, mdy=p.y-mouse.y, md=Math.sqrt(mdx*mdx+mdy*mdy);
            if(md<130){
                ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(mouse.x,mouse.y);
                ctx.strokeStyle=`rgba(236,72,153,${.12*(1-md/130)})`; ctx.lineWidth=.5; ctx.stroke();
            }
        }
        requestAnimationFrame(loop);
    }
    loop();

    // Custom cursor
    const cur = document.getElementById('cursor');
    const trail = document.getElementById('cursor-trail');
    let tx=0,ty=0,trX=0,trY=0;
    document.addEventListener('mousemove', e=>{
        tx=e.clientX; ty=e.clientY; mouse.x=tx; mouse.y=ty;
        cur.style.left=tx+'px'; cur.style.top=ty+'px';
    });
    (function animTrail(){
        trX+=(tx-trX)*.12; trY+=(ty-trY)*.12;
        trail.style.left=trX+'px'; trail.style.top=trY+'px';
        requestAnimationFrame(animTrail);
    })();

    function bindHoverGrow(el){
        el.addEventListener('mouseenter', ()=>{
            cur.style.width='20px'; cur.style.height='20px'; cur.style.background='rgba(236,72,153,0.6)';
            trail.style.width='58px'; trail.style.height='58px';
        });
        el.addEventListener('mouseleave', ()=>{
            cur.style.width='12px'; cur.style.height='12px'; cur.style.background='var(--rose)';
            trail.style.width='34px'; trail.style.height='34px';
        });
    }
    document.querySelectorAll('a,.profile-icon').forEach(bindHoverGrow);
    // re-bind for dynamically added feedback cards
    const listObserver = new MutationObserver(()=>{
        document.querySelectorAll('.feedback').forEach(bindHoverGrow);
    });
    listObserver.observe(document.getElementById('feedback-list'), {childList:true});

    // Feedback card 3D tilt
    function bindTilt(card){
        card.addEventListener('mousemove', function(e){
            const r=this.getBoundingClientRect();
            const cx=(e.clientX-r.left)/r.width-.5, cy=(e.clientY-r.top)/r.height-.5;
            this.style.transform=`perspective(900px) rotateY(${cx*4}deg) rotateX(${-cy*4}deg) translateY(-4px)`;
        });
        card.addEventListener('mouseleave', function(){ this.style.transform=''; });
    }
    const tiltObserver = new MutationObserver(()=>{
        document.querySelectorAll('.feedback').forEach(bindTilt);
    });
    tiltObserver.observe(document.getElementById('feedback-list'), {childList:true});

    var prefersReduced = false;
    if (typeof window.matchMedia === 'function') {
        var mql = window.matchMedia('(prefers-reduced-motion:reduce)');
        prefersReduced = !!(mql && mql.matches);
    }
    if (prefersReduced) {
        document.querySelectorAll('*').forEach(el=>{
            el.style.animationDuration='.01ms';
            el.style.transitionDuration='.01ms';
        });
    }
  })();
</script>

  <script src="/js/auth.js"></script>
  <script src="/js/validation.js"></script>
</body>
</html>
