<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login - Locality Connector</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#6C63FF;
  --accent2:#f5576c;
  --glass:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.12);
  --muted:rgba(255,255,255,0.55);
}
html,body{height:100%;margin:0}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#07070f;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* ── Animated background (pure CSS — no Three.js needed) ── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%),
             radial-gradient(ellipse at 80% 20%, rgba(245,87,108,0.1) 0%, transparent 50%),
             radial-gradient(ellipse at 60% 80%, rgba(139,92,246,0.1) 0%, transparent 50%),
             #07070f;
}
.bg-orb{
  position:absolute;border-radius:50%;filter:blur(60px);animation:drift 8s ease-in-out infinite;
}
.bg-orb-1{width:400px;height:400px;background:rgba(108,99,255,0.18);top:-100px;left:-100px;animation-delay:0s}
.bg-orb-2{width:300px;height:300px;background:rgba(245,87,108,0.12);bottom:-80px;right:-80px;animation-delay:-3s}
.bg-orb-3{width:200px;height:200px;background:rgba(139,92,246,0.15);top:50%;left:60%;animation-delay:-5s}

@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-20px) scale(1.05)}
  66%{transform:translate(-20px,30px) scale(0.95)}
}

/* Particles via CSS */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;
  animation:float-up linear infinite;
  opacity:0;
}
@keyframes float-up{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:0.5}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* Back button */
.back-btn{
  position:fixed;top:24px;left:24px;
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.8);padding:10px 20px;border-radius:999px;
  text-decoration:none;font-size:13px;font-weight:600;letter-spacing:0.5px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  z-index:100;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),border-color 0.3s,box-shadow 0.3s;
}
.back-btn:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,0.28);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}

/* Main card */
.container{
  position:relative;z-index:10;
  width:100%;max-width:860px;
  display:flex;margin:20px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,0.1);
  overflow:hidden;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04);
  animation:card-in 0.8s cubic-bezier(0.34,1.1,0.64,1) both;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(32px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── LEFT: Login panel ── */
.login-section{
  flex:1;
  background:rgba(8,8,18,0.9);
  padding:52px 48px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;
}
.login-section::after{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.08) 30%,rgba(255,255,255,0.08) 70%,transparent);
}

.login-logo{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(108,99,255,0.12);
  border:1px solid rgba(108,99,255,0.25);border-radius:999px;
  padding:5px 14px;font-size:11px;color:#6C63FF;
  text-transform:uppercase;letter-spacing:1.5px;font-weight:700;
  margin-bottom:36px;width:fit-content;
  animation:fade-up 0.6s 0.3s both;
}
.logo-dot{
  width:6px;height:6px;background:#6C63FF;border-radius:50%;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,0.7)}
  50%{box-shadow:0 0 0 5px rgba(108,99,255,0)}
}

h1{
  font-size:2rem;font-weight:700;color:#fff;
  letter-spacing:-0.5px;margin-bottom:8px;
  animation:fade-up 0.6s 0.45s both;
}
.login-sub{
  color:var(--muted);font-size:0.9rem;margin-bottom:36px;line-height:1.6;
  animation:fade-up 0.6s 0.55s both;
}

@keyframes fade-up{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

/* Message */
.message{
  padding:12px 16px;border-radius:12px;margin-bottom:20px;
  display:none;font-size:0.88rem;font-weight:500;
  animation:fade-up 0.4s ease;
}
.message.success{background:rgba(76,175,80,0.15);color:#4CAF50;border:1px solid rgba(76,175,80,0.3)}
.message.error{background:rgba(245,87,108,0.12);color:#f5576c;border:1px solid rgba(245,87,108,0.28)}

/* Form groups with floating labels */
.form-group{
  position:relative;margin-bottom:32px;
  animation:fade-up 0.6s both;
}
.form-group:nth-child(1){animation-delay:0.65s}
.form-group:nth-child(2){animation-delay:0.75s}

.form-group input{
  width:100%;padding:16px 0 10px;
  background:transparent;border:none;
  border-bottom:1px solid rgba(255,255,255,0.18);
  color:#fff;font-size:1rem;outline:none;
  transition:border-color 0.3s;
  font-family:inherit;
}
.form-group input:focus{border-bottom-color:rgba(108,99,255,0.6)}
.form-group input::placeholder{color:transparent}

.floating-label{
  position:absolute;top:14px;left:0;
  font-size:0.92rem;color:var(--muted);
  pointer-events:none;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  font-weight:500;
}
.form-group input:focus ~ .floating-label,
.form-group input:not(:placeholder-shown) ~ .floating-label{
  top:-8px;font-size:0.72rem;color:#6C63FF;letter-spacing:0.5px;
}

/* Animated underline */
.input-line{
  position:absolute;bottom:0;left:0;height:1.5px;width:0;
  background:linear-gradient(90deg,#6C63FF,#f5576c);
  border-radius:999px;
  transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.form-group:focus-within .input-line{width:100%}

/* Submit button */
.btn{
  width:100%;padding:14px;margin-top:4px;margin-bottom:20px;
  background:linear-gradient(135deg,#6C63FF 0%,#8B5CF6 100%);
  color:#fff;border:none;border-radius:14px;
  font-size:0.95rem;font-weight:700;letter-spacing:0.5px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s;
  box-shadow:0 0 0 1px rgba(108,99,255,0.4),0 16px 40px rgba(108,99,255,0.3);
  font-family:inherit;
  animation:fade-up 0.6s 0.88s both;
}
/* Light sweep effect */
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.18) 50%,transparent 70%);
  transform:translateX(-100%);
  transition:transform 0.5s ease;
}
.btn:hover::before{transform:translateX(100%)}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 0 1px rgba(108,99,255,0.6),0 24px 60px rgba(108,99,255,0.45);
}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.7;cursor:not-allowed}

/* Ripple */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.25);
  transform:scale(0);
  animation:ripple-anim 0.6s linear;
  pointer-events:none;
}
@keyframes ripple-anim{to{transform:scale(4);opacity:0}}

.link{
  display:block;text-align:center;
  color:rgba(108,99,255,0.75);
  font-size:0.88rem;text-decoration:none;
  transition:color 0.2s;
  animation:fade-up 0.6s 1s both;
}
.link:hover{color:#6C63FF;text-decoration:underline}

/* ── RIGHT: Info panel ── */
.message-section{
  flex:1;
  background:linear-gradient(145deg,rgba(108,99,255,0.12) 0%,rgba(245,87,108,0.08) 100%);
  padding:52px 44px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;position:relative;overflow:hidden;
}
.panel-orb{position:absolute;border-radius:50%;filter:blur(50px);pointer-events:none}
.panel-orb-1{width:220px;height:220px;background:rgba(108,99,255,0.22);top:-50px;right:-50px;animation:drift 7s ease-in-out infinite}
.panel-orb-2{width:160px;height:160px;background:rgba(245,87,108,0.18);bottom:-30px;left:-30px;animation:drift 9s ease-in-out infinite;animation-delay:-4s}

.panel-icon{
  width:80px;height:80px;border-radius:22px;
  margin-bottom:28px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;position:relative;z-index:1;
  box-shadow:0 16px 40px rgba(0,0,0,0.3);
  animation:float-icon 4s ease-in-out infinite, fade-up 0.7s 0.4s both;
}
@keyframes float-icon{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-10px) rotate(3deg)}
}

.welcome-title{
  font-size:1.9rem;font-weight:800;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,0.65));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-0.5px;margin-bottom:14px;
  position:relative;z-index:1;
  animation:fade-up 0.7s 0.55s both;
}
.welcome-text{
  color:var(--muted);line-height:1.75;font-size:0.92rem;
  position:relative;z-index:1;max-width:220px;
  animation:fade-up 0.7s 0.65s both;
}
.panel-divider{
  width:40px;height:2px;
  background:linear-gradient(90deg,#6C63FF,#f5576c);
  border-radius:999px;margin:22px auto;
  position:relative;z-index:1;
  animation:fade-up 0.6s 0.75s both;
}

.trust-badges{
  display:flex;flex-direction:column;gap:10px;
  position:relative;z-index:1;width:100%;
}
.trust-item{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:12px;padding:10px 14px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:fade-up 0.5s both;
  transition:border-color 0.3s,background 0.3s;
}
.trust-item:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15)}
.trust-item:nth-child(1){animation-delay:0.85s}
.trust-item:nth-child(2){animation-delay:0.95s}
.trust-item:nth-child(3){animation-delay:1.05s}

.trust-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.trust-dot.green{background:#4CAF50;box-shadow:0 0 6px rgba(76,175,80,0.7)}
.trust-dot.blue{background:#6C63FF;box-shadow:0 0 6px rgba(108,99,255,0.7)}
.trust-dot.red{background:#f5576c;box-shadow:0 0 6px rgba(245,87,108,0.7)}
.trust-text{font-size:0.8rem;color:rgba(255,255,255,0.65);text-align:left;line-height:1.3}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important}
}

@media(max-width:768px){
  .message-section{display:none}
  .login-section{padding:44px 28px}
  .container{border-radius:20px;margin:16px}
  body{align-items:flex-start;padding-top:80px;overflow-y:auto}
}
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<!-- CSS Particles -->
<div class="particles" id="particles"></div>

<a th:href="@{/user}" href="/user" class="back-btn">← Back</a>

<div class="container">

  <!-- LOGIN PANEL -->
  <div class="login-section">
    <div class="login-logo">
      <div class="logo-dot"></div>
      Locality Connector
    </div>
    <h1>Welcome back</h1>
    <p class="login-sub">Sign in to access your local community dashboard.</p>

    <div id="message" class="message"></div>

    <form id="user-login-form" novalidate>
      <div class="form-group">
        <input type="email" id="email" name="email" placeholder="email" required autocomplete="email">
        <label class="floating-label" for="email">Email address</label>
        <div class="input-line"></div>
      </div>
      <div class="form-group">
        <input type="password" id="password" name="password" placeholder="password" required autocomplete="current-password">
        <label class="floating-label" for="password">Password</label>
        <div class="input-line"></div>
      </div>
      <button type="submit" class="btn" id="submit-btn">Sign In →</button>
    </form>

    <a th:href="@{/user/signup}" href="user_signup.html" class="link">Don't have an account? Sign up</a>
  </div>

  <!-- RIGHT PANEL -->
  <div class="message-section">
    <div class="panel-orb panel-orb-1"></div>
    <div class="panel-orb panel-orb-2"></div>
    <div class="panel-icon">👋</div>
    <div class="welcome-title">Welcome Back!</div>
    <div class="welcome-text">We're happy to have you again. Your community is waiting.</div>
    <div class="panel-divider"></div>
    <div class="trust-badges">
      <div class="trust-item">
        <div class="trust-dot green"></div>
        <div class="trust-text">Local shops &amp; services near you</div>
      </div>
      <div class="trust-item">
        <div class="trust-dot blue"></div>
        <div class="trust-text">Trusted healthcare providers</div>
      </div>
      <div class="trust-item">
        <div class="trust-dot red"></div>
        <div class="trust-text">Support your local vendors</div>
      </div>
    </div>
  </div>

</div>

<script th:src="@{/js/auth.js}" src="/js/auth.js"></script>
<script th:src="@{/js/validation.js}" src="/js/validation.js"></script>
<script>
// ── CSS Particle system (no Three.js dependency) ──
(function(){
  const container = document.getElementById('particles');
  if (container) {
    const colors = ['rgba(108,99,255,0.6)','rgba(245,87,108,0.5)','rgba(139,92,246,0.6)','rgba(255,255,255,0.3)'];
    const count = window.innerWidth < 768 ? 20 : 40;
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random()*3+1;
      p.style.cssText = `
        width:${size}px;height:${size}px;
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${Math.random()*15+8}s;
        animation-delay:${Math.random()*10}s;
      `;
      container.appendChild(p);
    }
  }
})();

// ── Ripple on button ──
const submitBtn = document.getElementById('submit-btn');
if (submitBtn) {
  submitBtn.addEventListener('click', function(e){
    const r = this.getBoundingClientRect();
    const rip = document.createElement('span');
    const size = Math.max(r.width, r.height);
    rip.className = 'ripple';
    Object.assign(rip.style,{
      width:size+'px', height:size+'px',
      left:(e.clientX-r.left-size/2)+'px',
      top:(e.clientY-r.top-size/2)+'px'
    });
    this.appendChild(rip);
    setTimeout(()=>rip.remove(), 700);
  });
}

// ── Subtle mouse parallax on the card (CSS only, no GSAP) ──
const card = document.querySelector('.container');
if (card) {
  document.addEventListener('mousemove', e => {
    const cx = window.innerWidth/2, cy = window.innerHeight/2;
    const dx = (e.clientX-cx)/cx, dy = (e.clientY-cy)/cy;
    card.style.transform = `perspective(1200px) rotateY(${dx*2}deg) rotateX(${-dy*1.5}deg)`;
  });
  document.addEventListener('mouseleave', () => {
    card.style.transform = 'perspective(1200px) rotateY(0deg) rotateX(0deg)';
  });
  card.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1)';
}

// ── Form login logic integrated with JWT auth storage ──
const form = document.getElementById('user-login-form');
const messageDiv = document.getElementById('message');

if (form) {
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const email = emailInput ? emailInput.value.trim() : '';
    const password = passwordInput ? passwordInput.value : '';
    const btn = document.getElementById('submit-btn');
    if (btn) { btn.textContent = 'Signing in…'; btn.disabled = true; }

    try {
      if (window.LCAuth && typeof window.LCAuth.login === 'function') {
        try {
          await window.LCAuth.login('user', email, password);
          showMessage('Login successful! Redirecting…', 'success');
          setTimeout(() => { window.location.href = '/enhanced-user-dashboard'; }, 1500);
          return;
        } catch (err) {
          showMessage(err.message || 'Login failed. Please check your credentials.', 'error');
          if (btn) { btn.textContent = 'Sign In →'; btn.disabled = false; }
          return;
        }
      } else {
        const response = await fetch(`/api/auth/user/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });
        const result = await response.json();
        if (response.ok && (result.success !== false)) {
          const data = result.data || result;
          if (window.LCAuth && data.token) {
            window.LCAuth.setSession(data.token, {
              id: data.userId || data.id,
              name: data.name,
              email: data.email || email,
              roles: data.roles || ['USER']
            });
          }
          showMessage('Login successful! Redirecting…', 'success');
          setTimeout(() => { window.location.href = '/enhanced-user-dashboard'; }, 1500);
        } else {
          showMessage(result.error || (result.data && result.data.message) || 'Login failed. Please check your credentials.', 'error');
          if (btn) { btn.textContent = 'Sign In →'; btn.disabled = false; }
        }
      }
    } catch (error) {
      showMessage('Network error. Please check your connection.', 'error');
      if (btn) { btn.textContent = 'Sign In →'; btn.disabled = false; }
    }
  });
}

function showMessage(text, type) {
  if (!messageDiv) return;
  messageDiv.textContent = text;
  messageDiv.className = `message ${type}`;
  messageDiv.style.display = 'block';
  setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
}
</script>
</body>
</html>
