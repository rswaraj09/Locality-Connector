<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Locality Connector</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        :root{
          --blue:#3b82f6; --indigo:#6366f1; --green:#34d399; --amber:#fbbf24;
          --dark0:#060b14; --glass:rgba(255,255,255,0.045); --glass-border:rgba(255,255,255,0.10);
          --text1:#f0f6ff; --text2:#94a3b8; --text3:#64748b;
        }

        html{scroll-behavior:smooth;}
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background: var(--dark0);
            color: var(--text1);
            min-height: 100vh;
            overflow-x:hidden;
            cursor:none;
            position:relative;
        }

        /* ── custom cursor ── */
        #cursor{position:fixed;width:12px;height:12px;background:var(--blue);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:screen;}
        #cursor-trail{position:fixed;width:34px;height:34px;border:1px solid rgba(99,102,241,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .12s ease,top .12s ease,width .3s,height .3s;}

        /* ── particle bg ── */
        #bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}

        /* ── ambient orbs ── */
        .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:orbFloat 9s ease-in-out infinite;}
        .orb1{width:520px;height:520px;background:radial-gradient(circle,rgba(99,102,241,.14),transparent 70%);top:-10%;left:-10%;}
        .orb2{width:460px;height:460px;background:radial-gradient(circle,rgba(52,211,153,.1),transparent 70%);bottom:-10%;right:-8%;animation-delay:-4s;}
        @keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-26px) scale(1.05);}}

        /* ── header ── */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(6,11,20,.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeDown .7s ease both;
        }
        @keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
        .header h1 {
            font-size: 1.7rem; font-weight: 800;
            background: linear-gradient(135deg,#60a5fa,#34d399);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .logout-btn {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg,#f5576c,#c02942);
            color: white; padding: 10px 24px;
            border: none; border-radius: 30px;
            cursor: none; text-decoration: none;
            font-weight: 700; font-size: .85rem;
            box-shadow: 0 0 20px rgba(245,87,108,.3);
            transition: transform .3s, box-shadow .3s;
        }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(245,87,108,.4); }

        /* ── container ── */
        .container {
            position: relative; z-index: 10;
            max-width: 1200px; margin: 0 auto; padding: 30px 20px;
        }

        /* ── location status ── */
        .location-info { margin-bottom: 20px; opacity:0; transform:translateY(-10px); animation: fadeUp .6s ease both; }
        @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
        .location-status {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            padding: 15px 20px;
            border-radius: 14px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,.25);
        }
        .location-icon { font-size: 1.2rem; }

        /* ── category filter ── */
        .category-filter { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
        .category-btn {
            position: relative; overflow: hidden;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text2);
            padding: 10px 22px;
            border-radius: 30px;
            cursor: none;
            font-size: .85rem; font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all .3s;
        }
        .category-btn:hover { border-color: rgba(99,102,241,.4); color: var(--text1); transform: translateY(-2px); }
        .category-btn.active {
            background: linear-gradient(135deg, var(--blue), var(--indigo));
            color: white; border-color: transparent;
            box-shadow: 0 0 20px rgba(99,102,241,.4);
        }

        /* ── dashboard grid / cards ── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
            position: relative; overflow: hidden;
            opacity: 0; transform: translateY(24px);
            animation: riseIn .7s .1s ease both;
            transition: transform .35s, box-shadow .35s, border-color .35s;
        }
        @keyframes riseIn{to{opacity:1;transform:translateY(0);}}
        .card::before {
            content:''; position:absolute; inset:0; opacity:0; transition:opacity .4s;
            background: radial-gradient(circle at 25% 20%, rgba(99,102,241,.08), transparent 60%);
            pointer-events:none;
        }
        .card:hover { transform: translateY(-6px); box-shadow: 0 30px 70px rgba(99,102,241,.14); border-color: rgba(99,102,241,.28); }
        .card:hover::before{opacity:1;}
        .card h3 {
            margin-bottom: 18px; font-size: 1.15rem; font-weight: 700;
            background: linear-gradient(135deg,#60a5fa,#a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* ── business item ── */
        .business-item {
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(255,255,255,.025);
            opacity: 0; transform: translateY(14px) scale(.98);
            animation: itemIn .45s ease forwards;
            transition: border-color .3s, box-shadow .3s, transform .3s;
        }
        @keyframes itemIn{to{opacity:1;transform:translateY(0) scale(1);}}
        .business-item:hover {
            border-color: rgba(99,102,241,.3);
            box-shadow: 0 14px 34px rgba(99,102,241,.12);
            transform: translateY(-2px);
        }
        .business-item img { border: 1px solid var(--glass-border) !important; }
        .business-item h4 { color: var(--text1); margin-bottom: 5px; }
        .business-item p { color: var(--text2); font-size: .9rem; }

        /* ── buttons ── */
        .btn {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, var(--blue), var(--indigo));
            color: white; padding: 10px 22px;
            border: none; border-radius: 24px;
            cursor: none; text-decoration: none;
            display: inline-block; margin-top: 10px;
            font-weight: 700; font-size: .85rem;
            box-shadow: 0 0 18px rgba(99,102,241,.28);
            transition: transform .3s, box-shadow .3s;
        }
        .btn::before{
            content:''; position:absolute; inset:0;
            background:rgba(255,255,255,.15); transform:scaleX(0);
            transform-origin:left; transition:transform .35s; border-radius:24px;
        }
        .btn:hover::before{transform:scaleX(1);}
        .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(99,102,241,.4); }
        .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rippleAnim .6s ease;pointer-events:none;}
        @keyframes rippleAnim{to{transform:scale(4);opacity:0;}}

        .btn-directions { background: linear-gradient(135deg,#34d399,#059669); margin-left: 10px; box-shadow: 0 0 18px rgba(52,211,153,.28); }
        .btn-directions:hover { box-shadow: 0 14px 34px rgba(52,211,153,.4); }
        .btn-small { padding: 5px 15px; font-size: .8rem; margin-left: auto; margin-top: 0; }

        .loading { text-align: center; color: var(--text2); font-size: 1.1rem; padding: 20px 0; }

        /* ── modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(6,11,20,.7);
            backdrop-filter: blur(6px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            animation: overlayIn .25s ease both;
        }
        @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
        .modal-content {
            background: rgba(15,20,32,.92);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            border-radius: 22px;
            max-width: 800px; width: 90%; max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 90px rgba(0,0,0,.5);
            animation: modalPop .35s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes modalPop{from{opacity:0;transform:scale(.92) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; border-bottom: 1px solid var(--glass-border);
        }
        .modal-header h3 { margin: 0; color: var(--text1); font-weight: 700; }
        .close-btn {
            background: none; border: none; font-size: 24px;
            cursor: none; color: var(--text3);
            padding: 0; width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: color .3s, background .3s;
        }
        .close-btn:hover { color: #fca5a5; background: rgba(245,87,108,.1); }
        .modal-body { padding: 20px 24px; }

        .item-card {
            background: rgba(255,255,255,.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 15px; margin-bottom: 14px;
            transition: transform .3s, box-shadow .3s, border-color .3s;
        }
        .item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 34px rgba(99,102,241,.14);
            border-color: rgba(99,102,241,.3);
        }
        .item-card h4 { margin: 0 0 10px 0; color: var(--text1); }
        .item-price { font-size: 1.15em; font-weight: 800; color: #a78bfa; margin: 5px 0; }
        .item-description { color: var(--text2); margin: 5px 0 10px 0; font-style: italic; }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .header h1 { font-size: 1.3rem; }
        }
        @media (prefers-reduced-motion: reduce) {
            *,*::before,*::after{ animation-duration:.01ms!important; transition-duration:.01ms!important; }
        }
    </style>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-trail"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="header">
        <h1>Welcome <span th:text="${session.loggedInUserName != null ? session.loggedInUserName : 'User'}"></span></h1>
        <div class="header-actions">
            <a href="/user/login" class="logout-btn">Logout</a>
        </div>
    </div>

    <div class="container">
        <div id="location-info" class="location-info"></div>

        <div class="category-filter">
            <button class="category-btn active" onclick="filterBusinesses('all')">All</button>
            <button class="category-btn" onclick="filterBusinesses('food')">Food</button>
            <button class="category-btn" onclick="filterBusinesses('pharmacy')">Pharmacy</button>
            <button class="category-btn" onclick="filterBusinesses('clothing')">Clothing</button>
            <button class="category-btn" onclick="filterBusinesses('stationary')">Stationary</button>
            <button class="category-btn" onclick="filterBusinesses('hospital')">Hospital</button>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Local Businesses</h3>
                <div id="businesses-list">
                    <div class="loading">Loading businesses...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ══════════════════════════════════════════════════════
           ORIGINAL APPLICATION LOGIC — UNCHANGED
        ══════════════════════════════════════════════════════ */
        let allBusinesses = [];
        let currentFilter = 'all';
        let userLocation = null;

        document.addEventListener('DOMContentLoaded', function() {
            requestLocationPermission();
        });

        function requestLocationPermission() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        userLocation = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        };
                        loadNearbyBusinesses();
                        showLocationStatus('Location detected! Showing nearby businesses within 5km.', 'success');
                    },
                    function(error) {
                        console.error('Geolocation error:', error);
                        showLocationStatus('Location access denied. Showing all businesses.', 'warning');
                        loadAllBusinesses();
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 300000
                    }
                );
            } else {
                showLocationStatus('Geolocation not supported. Showing all businesses.', 'warning');
                loadAllBusinesses();
            }
        }

        async function loadNearbyBusinesses() {
            if (!userLocation) {
                loadAllBusinesses();
                return;
            }

            try {
                const response = await fetch(`/api/user/dashboard/businesses/nearby?latitude=${userLocation.latitude}&longitude=${userLocation.longitude}&radiusKm=5`);
                const businesses = await response.json();
                allBusinesses = businesses;
                displayBusinesses(businesses);
                updateLocationInfo();
            } catch (error) {
                console.error('Error loading nearby businesses:', error);
                showLocationStatus('Error loading nearby businesses. Showing all businesses.', 'error');
                loadAllBusinesses();
            }
        }

        async function loadAllBusinesses() {
            try {
                const response = await fetch('/api/user/dashboard/businesses');
                const businesses = await response.json();
                allBusinesses = businesses;
                displayBusinesses(businesses);
            } catch (error) {
                document.getElementById('businesses-list').innerHTML = '<p>Error loading businesses</p>';
            }
        }

        function updateLocationInfo() {
            const locationInfo = document.getElementById('location-info');
            if (locationInfo && userLocation) {
                locationInfo.innerHTML = `
                    <div class="location-status">
                        <span class="location-icon">📍</span>
                        <span>Lat: ${userLocation.latitude.toFixed(6)}, Lon: ${userLocation.longitude.toFixed(6)} — showing businesses within 5km</span>
                        <button class="btn btn-small" onclick="refreshLocation()">Refresh Location</button>
                    </div>
                `;
            }
        }

        function refreshLocation() {
            showLocationStatus('Refreshing location...', 'info');
            requestLocationPermission();
        }

        function displayBusinesses(businesses) {
            const container = document.getElementById('businesses-list');
            if (!businesses || businesses.length === 0) {
                container.innerHTML = '<p>No businesses found.</p>';
                return;
            }

            container.innerHTML = businesses.map(business => {
                let distanceInfo = '';
                if (userLocation && business.latitude && business.longitude) {
                    const distance = calculateDistance(
                        userLocation.latitude, 
                        userLocation.longitude,
                        business.latitude, 
                        business.longitude
                    );
                    distanceInfo = `<p><strong>Distance:</strong> ${distance.toFixed(1)} km</p>`;
                }
                const imgUrl = business.logoUrl || business.storefrontUrl || 'https://via.placeholder.com/60?text=Shop';
                return `
                    <div class="business-item" style="display:flex; gap: 15px; align-items: flex-start;">
                        <img src="${imgUrl}" alt="${business.businessName}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc;" onerror="this.src='https://via.placeholder.com/60?text=Shop'" />
                        <div style="flex:1;">
                            <h4>${business.businessName}</h4>
                            <p><strong>Category:</strong> ${business.category}</p>
                            <p><strong>Address:</strong> ${business.address}</p>
                            <p><strong>Phone:</strong> ${business.phoneNumber}</p>
                            ${distanceInfo}
                            <button class="btn" onclick="viewBusinessItems('${business.id}')">View Items</button>
                            <button class="btn btn-directions" onclick="getBusinessDirections('${business.id}', ${business.latitude}, ${business.longitude})">Get Directions</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function filterBusinesses(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if (window.event && window.event.target) {
                window.event.target.classList.add('active');
            }
            if (category === 'all') {
                displayBusinesses(allBusinesses);
            } else if (userLocation) {
                loadNearbyBusinessesByCategory(category);
            } else {
                const filtered = allBusinesses.filter(business => business.category === category);
                displayBusinesses(filtered);
            }
        }

        async function loadNearbyBusinessesByCategory(category) {
            if (!userLocation) {
                const filtered = allBusinesses.filter(business => business.category === category);
                displayBusinesses(filtered);
                return;
            }

            try {
                const response = await fetch(`/api/user/dashboard/businesses/nearby?latitude=${userLocation.latitude}&longitude=${userLocation.longitude}&radiusKm=5&category=${category}`);
                const businesses = await response.json();
                displayBusinesses(businesses);
            } catch (error) {
                console.error('Error loading nearby businesses by category:', error);
                const filtered = allBusinesses.filter(business => business.category === category);
                displayBusinesses(filtered);
            }
        }

        async function viewBusinessItems(businessId) {
            try {
                const response = await fetch(`/api/user/dashboard/items/business/${businessId}`);
                const items = await response.json();
                
                if (response.ok) {
                    displayBusinessItemsModal(items, businessId);
                } else {
                    alert('Error loading items: ' + items.error);
                }
            } catch (error) {
                alert('Error loading items: ' + error.message);
            }
        }

        function displayBusinessItemsModal(items, businessId) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Business Items</h3>
                        <button class="close-btn" onclick="closeModal()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div id="items-container">
                            ${items.length === 0 ? '<p>No items available</p>' : ''}
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const itemsContainer = document.getElementById('items-container');
            if (items.length > 0) {
                itemsContainer.innerHTML = items.map(item => {
                    const itemImg = item.imageUrl || item.photoUrl || 'https://via.placeholder.com/100?text=Item';
                    return `
                    <div class="item-card" style="display:flex; gap: 15px; align-items: center;">
                        <img src="${itemImg}" alt="${item.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;" onerror="this.src='https://via.placeholder.com/100?text=Item'" />
                        <div style="flex:1;">
                            <h4>${item.name}</h4>
                            <p class="item-price">₹${item.price.toFixed(2)}</p>
                            <p class="item-description">${item.description || 'No description'}</p>
                            <button class="btn" onclick="viewItemDetails('${item.id}', '${encodeURIComponent(JSON.stringify(item))}')">View Details</button>
                            <button class="btn btn-directions" onclick="getDirections('${businessId}', '${item.id}')">Get Directions</button>
                        </div>
                    </div>
                `}).join('');
            }
        }

        function closeModal() {
            const modal = document.querySelector('.modal-overlay');
            if (modal) {
                modal.remove();
            }
        }

        function viewItemDetails(itemId, itemJson) {
            try {
                const item = JSON.parse(decodeURIComponent(itemJson));
                const itemImg = item.imageUrl || item.photoUrl || 'https://via.placeholder.com/200?text=Item';
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
                    <div class="modal-content" style="max-width: 500px;">
                        <div class="modal-header">
                            <h3>${item.name}</h3>
                            <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">&times;</button>
                        </div>
                        <div class="modal-body" style="text-align: center;">
                            <img src="${itemImg}" alt="${item.name}" style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px;" onerror="this.src='https://via.placeholder.com/200?text=Item'" />
                            <h4 style="color: #a78bfa; font-size: 1.5em; margin-bottom: 10px;">₹${item.price.toFixed(2)}</h4>
                            <p style="color: #94a3b8; margin-bottom: 15px;">${item.description || 'No detailed description available for this item.'}</p>
                            ${item.category ? `<p><strong>Category:</strong> ${item.category}</p>` : ''}
                            ${item.stock !== undefined ? `<p><strong>Stock:</strong> ${item.stock}</p>` : ''}
                            <button class="btn" onclick="this.closest('.modal-overlay').remove()">Close</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            } catch(e) {
                showMessage('Item details: ID ' + itemId, 'info');
            }
        }

        async function getBusinessDirections(businessId, businessLat, businessLon) {
            if (!userLocation) {
                showMessage('Location not available. Please enable location access.', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/directions/route?startLat=${userLocation.latitude}&startLon=${userLocation.longitude}&endLat=${businessLat}&endLon=${businessLon}`);
                const data = await response.json();
                
                if (response.ok) {
                    const navUrl = encodeURI(data.url);
                    const gUrl = buildGoogleMapsUrl(userLocation.latitude, userLocation.longitude, businessLat, businessLon);
                    openExternalUrl(gUrl || navUrl);
                    if (data.distanceKm && data.durationMin) {
                        showMessage(`Distance: ${data.distanceKm.toFixed(2)} km, ETA: ${Math.ceil(data.durationMin)} min`, 'info');
                    }
                    showMessage('Opening directions in new tab...', 'success');
                } else {
                    showMessage('Error getting directions: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error getting directions: ' + error.message, 'error');
            }
        }

        async function getDirections(businessId, itemId) {
            if (!userLocation) {
                showMessage('Location not available. Please enable location access.', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/user/dashboard/items/business/${businessId}`);
                const items = await response.json();
                
                if (response.ok && items.length > 0) {
                    const business = items[0];
                    if (business.businessLatitude && business.businessLongitude) {
                        const directionsResponse = await fetch(`/api/directions/url?startLat=${userLocation.latitude}&startLon=${userLocation.longitude}&endLat=${business.businessLatitude}&endLon=${business.businessLongitude}`);
                        const data = await directionsResponse.json();
                        
                        if (directionsResponse.ok) {
                            const navUrl = encodeURI(data.url);
                            const gUrl = buildGoogleMapsUrl(userLocation.latitude, userLocation.longitude, business.businessLatitude, business.businessLongitude);
                            openExternalUrl(gUrl || navUrl);
                            showMessage('Opening directions in new tab...', 'success');
                        } else {
                            showMessage('Error getting directions: ' + data.error, 'error');
                        }
                    } else {
                        showMessage('Business location not available', 'error');
                    }
                } else {
                    showMessage('Error loading business information', 'error');
                }
            } catch (error) {
                showMessage('Error getting directions: ' + error.message, 'error');
            }
        }

        function openExternalUrl(url) {
            try {
                const newWindow = window.open(url, '_blank', 'noopener');
                if (!newWindow) {
                    window.location.assign(url);
                }
            } catch (_) {
                window.location.assign(url);
            }
        }

        function buildGoogleMapsUrl(sLat, sLon, dLat, dLon) {
            if ([sLat, sLon, dLat, dLon].some(v => v === undefined || v === null || isNaN(v))) {
                return null;
            }
            const origin = encodeURIComponent(`${sLat},${sLon}`);
            const destination = encodeURIComponent(`${dLat},${dLon}`);
            return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
        }

        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            messageDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 10px;
                color: white;
                font-weight: bold;
                z-index: 10000;
                background: ${type === 'success' ? '#4CAF50' : type === 'warning' ? '#ff9800' : type === 'info' ? '#2196F3' : '#f44336'};
            `;
            
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        function showLocationStatus(message, type) {
            const locationInfo = document.getElementById('location-info');
            if (locationInfo) {
                locationInfo.innerHTML = `
                    <div class="location-status">
                        <span class="location-icon">${type === 'success' ? '📍' : type === 'warning' ? '⚠️' : type === 'info' ? 'ℹ️' : '❌'}</span>
                        <span>${message}</span>
                        ${userLocation ? '<button class="btn btn-small" onclick="refreshLocation()">Refresh Location</button>' : ''}
                    </div>
                `;
            }
        }
    </script>

    <script>
        /* ══════════════════════════════════════════════════════
           NEW — PURELY VISUAL ENHANCEMENTS (ES5, no ?./??, no
           double-call patterns, no arrow-fn dependence)
        ══════════════════════════════════════════════════════ */
        (function () {
            'use strict';

            // Particle canvas
            var canvas = document.getElementById('bg-canvas');
            var ctx = canvas.getContext('2d');
            var W, H;
            var mouse = { x: -999, y: -999 };
            var COUNT = window.innerWidth < 768 ? 50 : 90;

            function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            function Particle(){ this.reset(); }
            Particle.prototype.reset = function(){
                this.x = Math.random()*W; this.y = Math.random()*H;
                this.r = Math.random()*1.1+.3;
                this.vx = (Math.random()-.5)*.25; this.vy = (Math.random()-.5)*.25;
                this.a = Math.random()*.4+.08;
                this.c = Math.random()>.5 ? '99,102,241' : '52,211,153';
            };
            Particle.prototype.step = function(){
                this.x += this.vx; this.y += this.vy;
                if (this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
            };
            Particle.prototype.draw = function(){
                ctx.beginPath();
                ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
                ctx.fillStyle = 'rgba(' + this.c + ',' + this.a + ')';
                ctx.fill();
            };

            var parts = [];
            for (var i=0;i<COUNT;i++) parts.push(new Particle());

            function loop(){
                ctx.clearRect(0,0,W,H);
                for (var i=0;i<parts.length;i++){ parts[i].step(); parts[i].draw(); }
                for (var i=0;i<parts.length;i++){
                    var p = parts[i];
                    var mdx = p.x-mouse.x, mdy = p.y-mouse.y, md = Math.sqrt(mdx*mdx+mdy*mdy);
                    if (md<130){
                        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(mouse.x,mouse.y);
                        ctx.strokeStyle = 'rgba(99,102,241,' + (0.12*(1-md/130)) + ')';
                        ctx.lineWidth = .5; ctx.stroke();
                    }
                }
                requestAnimationFrame(loop);
            }
            loop();

            // Custom cursor
            var cur = document.getElementById('cursor');
            var trail = document.getElementById('cursor-trail');
            var tx=0, ty=0, trX=0, trY=0;
            document.addEventListener('mousemove', function(e){
                tx = e.clientX; ty = e.clientY; mouse.x = tx; mouse.y = ty;
                cur.style.left = tx+'px'; cur.style.top = ty+'px';
            });
            function animTrail(){
                trX += (tx-trX)*.12; trY += (ty-trY)*.12;
                trail.style.left = trX+'px'; trail.style.top = trY+'px';
                requestAnimationFrame(animTrail);
            }
            animTrail();

            function bindHoverGrow(el){
                el.addEventListener('mouseenter', function(){
                    cur.style.width='20px'; cur.style.height='20px'; cur.style.background='rgba(99,102,241,0.6)';
                    trail.style.width='58px'; trail.style.height='58px';
                });
                el.addEventListener('mouseleave', function(){
                    cur.style.width='12px'; cur.style.height='12px'; cur.style.background='var(--blue)';
                    trail.style.width='34px'; trail.style.height='34px';
                });
            }
            function rebindHoverAll(){
                var els = document.querySelectorAll('a,.btn,.card,.category-btn,.business-item,.close-btn');
                for (var i=0;i<els.length;i++) bindHoverGrow(els[i]);
            }
            rebindHoverAll();

            // Re-bind whenever the business list, modals, or messages are re-rendered
            var listEl = document.getElementById('businesses-list');
            if (listEl) {
                var listObserver = new MutationObserver(rebindHoverAll);
                listObserver.observe(listEl, { childList: true, subtree: true });
            }
            var bodyObserver = new MutationObserver(rebindHoverAll);
            bodyObserver.observe(document.body, { childList: true });

            // Ripple on buttons (delegated so it works for all dynamically added buttons)
            document.addEventListener('click', function(e){
                var btn = e.target && e.target.closest ? e.target.closest('.btn, .category-btn, .logout-btn') : null;
                if (!btn) return;
                var span = document.createElement('span');
                var rect = btn.getBoundingClientRect();
                var size = Math.max(rect.width, rect.height);
                span.className = 'ripple';
                span.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px';
                btn.style.position = btn.style.position || 'relative';
                btn.style.overflow = 'hidden';
                btn.appendChild(span);
                setTimeout(function(){ span.remove(); }, 600);
            });

            // Card 3D tilt (delegated via mousemove on container, applied to whichever card/item is hovered)
            function bindTilt(el, strength){
                el.addEventListener('mousemove', function(e){
                    var r = this.getBoundingClientRect();
                    var cx = (e.clientX-r.left)/r.width-.5, cy = (e.clientY-r.top)/r.height-.5;
                    this.style.transform = 'perspective(1000px) rotateY('+(cx*strength)+'deg) rotateX('+(-cy*strength)+'deg) translateY(-4px)';
                });
                el.addEventListener('mouseleave', function(){ this.style.transform = ''; });
            }
            function rebindTilt(){
                var cards = document.querySelectorAll('.card');
                for (var i=0;i<cards.length;i++) bindTilt(cards[i], 3);
                var items = document.querySelectorAll('.business-item, .item-card');
                for (var j=0;j<items.length;j++) bindTilt(items[j], 2);
            }
            rebindTilt();
            if (listEl) {
                var tiltObserver = new MutationObserver(rebindTilt);
                tiltObserver.observe(listEl, { childList: true, subtree: true });
            }
            var modalTiltObserver = new MutationObserver(rebindTilt);
            modalTiltObserver.observe(document.body, { childList: true });

            // Reduced motion
            var prefersReduced = false;
            if (typeof window.matchMedia === 'function') {
                var mql = window.matchMedia('(prefers-reduced-motion:reduce)');
                prefersReduced = !!(mql && mql.matches);
            }
            if (prefersReduced) {
                var allEls = document.querySelectorAll('*');
                for (var i=0;i<allEls.length;i++){
                    allEls[i].style.animationDuration = '.01ms';
                    allEls[i].style.transitionDuration = '.01ms';
                }
            }
        })();
    </script>

  <script src="/js/notifications.js"></script>
