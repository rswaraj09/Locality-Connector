spring.application.name=localityconnector

# Active Profile
spring.profiles.active=dev

# Firebase Configuration
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:serviceAccountKey.json}

# Server Configuration
server.port=${SERVER_PORT:8081}

# Logging Configuration
logging.level.com.example.localityconnector=${APP_LOG_LEVEL:INFO}

# JWT Configuration
# REQUIRED: provide JWT_SECRET_KEY (minimum 32 characters) via environment variable.
# There is intentionally NO insecure default fallback - the app fails fast at startup
# if this is missing (see JwtUtil), which prevents shipping a known/default signing key.
jwt.secret=${JWT_SECRET_KEY}

# ---- Admin access ----
# Comma-separated list of emails that are granted the ADMIN role at login time.
app.admin.emails=${ADMIN_EMAILS:}

# ---- CORS ----
# Comma-separated list of allowed origins for browser clients.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081}

# ---- Springdoc / Swagger UI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---- Rate Limiting ----
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:60}

# ---- Application Base URL ----
app.base-url=${APP_BASE_URL:http://localhost:8081}
app.name=Locality Connector

# ---- Firebase Cloud Storage ----
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}

# ---- Email / SMTP ----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- File Upload Limits ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# ---- Google Maps API ----
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
google.maps.geocoding.api.key=${GOOGLE_GEOCODING_API_KEY:}

# ---- Mappls API ----
mappls.api.key=${MAPPLS_API_KEY:}
